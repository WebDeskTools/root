<div class="offcanvas-header">
  <h5 class="offcanvas-title" id="offcanvasRightLabel">Contact</h5>

  <button
    type="button"
    class="btn-close"
    data-bs-dismiss="offcanvas"
    aria-label="Close"
  ></button>
</div>

<div class="offcanvas-body">

<p><strong>Name:</strong> Okan Kaplan</p>

<form id="contactForm" novalidate>

  <div class="mb-3">
    <label for="nameInput" class="form-label">Name</label>
    <input
      type="text"
      class="form-control"
      id="nameInput"
      placeholder="Enter your name"
      required
      maxlength="50"
      autocomplete="name">
  </div>

  <div class="mb-3">
    <label for="messageInput" class="form-label">Message</label>
    <textarea
      class="form-control"
      id="messageInput"
      rows="3"
      placeholder="Write your message"
      required
      maxlength="500"
      autocomplete="off"></textarea>
  </div>

  <button
    type="submit"
    class="btn btn-success w-100"
    id="sendBtn"
    aria-label="Send message via WhatsApp">
    WhatsApp Send
  </button>

</form>

<script>
document.addEventListener('submit', function(e) {
  const targetForm = e.target;

  if (targetForm && targetForm.id === 'contactForm') {
    e.preventDefault();

    const nameInput = targetForm.querySelector('#nameInput');
    const messageInput = targetForm.querySelector('#messageInput');
    const btn = targetForm.querySelector('#sendBtn');

    if (!nameInput || !messageInput || !btn) return;

    const name = nameInput.value.trim();
    const message = messageInput.value.trim();

    // English validation check
    if (!name || !message) {
        alert("Please fill in all fields.");
        return;
    }

    // Update button status
    btn.disabled = true;
    const originalText = btn.innerText;
    btn.innerText = 'Redirecting...';

    // Data sanitization
    const safeName = name.replace(/[<>]/g, '');
    const safeMessage = message.replace(/[<>]/g, '');
    const phone = '905362279390';
    
    // English Message Template
    const text = encodeURIComponent(`Name: ${safeName}\nMessage: ${safeMessage}`);
    const url = `https://wa.me/${phone}?text=${text}`;
    
    window.open(url, '_blank', 'noopener,noreferrer');

    // Reset form and button
    setTimeout(() => {
      btn.disabled = false;
      btn.innerText = originalText;
      targetForm.reset();
    }, 2000);
  }
});
</script>

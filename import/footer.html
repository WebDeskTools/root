<style>
.footer-github {
  border-top: 1px solid #e5e7eb;
  padding: 20px 0;
  font-size: 14px;
  color: #57606a;
  background: #fff;
}

.footer-inner {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.footer-copy {
  white-space: nowrap;
}

.footer-links {
  display: flex;
  gap: 16px;
}

.footer-links a {
  color: #57606a;
  text-decoration: none;
  transition: color 0.2s ease;
  font-size: 16px;
}

.footer-links a:hover {
  color: #0969da; /* GitHub blue */
}

#scrollTopBtn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: #24292f; /* GitHub tonu */
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
  transition: all .3s ease;
  z-index: 999;
}

#scrollTopBtn:hover {
  background: #000;
  transform: translateY(-4px);
}
</style>

<footer class="footer-github">
  <div class="container">
    <div class="footer-inner">
      <!-- Lisans ve Copyright -->
      <span class="footer-copy">
        © 2026 Okan Kaplan – MIT License 
        <a href="LICENSE" target="_blank" rel="noopener noreferrer" aria-label="Read full MIT license">Read full license</a>
      </span>

      <!-- Sosyal ikonlar -->
      <div class="footer-links">
        <a href="https://www.youtube.com/@Ki%C5%9FiselGeli%C5%9Fim-Video-Pdf-img" target="_blank" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
        <a href="https://github.com" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://www.udemy.com/user/okan-kaplan-7" target="_blank" aria-label="Udemy"><i class="fas fa-graduation-cap"></i></a>
        <a href="https://linkedin.com/in/canvasor" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
        <a href="https://medium.com/@livehtml" target="_blank" aria-label="Medium"><i class="fab fa-medium"></i></a>
        <a href="https://dev.to/okan_kaplan_livehtml" target="_blank" aria-label="Dev.to"><i class="fab fa-dev"></i></a>
        <a href="https://gitlab.com/bandanee/" target="_blank" aria-label="GitLab"><i class="fab fa-gitlab"></i></a>
      </div>
    </div>
  </div>

  <!-- Scroll To Top Button -->
  <button id="scrollTopBtn" aria-label="Yukarı Çık">
    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" class="bi bi-arrow-up-circle-fill" viewBox="0 0 16 16">
      <path d="M16 8A8 8 0 1 0 0 8a8 8 0 0 0 16 0m-7.5 3.5a.5.5 0 0 1-1 0V5.707L5.354 7.854a.5.5 0 1 1-.708-.708l3-3a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707z"/>
    </svg>
  </button>
</footer>

<script>
// Scroll to Top Button
const scrollTopBtn = document.getElementById("scrollTopBtn");

window.addEventListener("scroll", () => {
  scrollTopBtn.style.display = (window.scrollY > 300) ? "flex" : "none";
});

scrollTopBtn.addEventListener("click", () => {
  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
  scrollTopBtn.blur(); // Erişilebilirlik için tıklamadan sonra focus kaybolur
});
</script>
